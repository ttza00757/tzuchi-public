<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    background: linear-gradient(150deg, #FFF3EA 0%, #FFE3D1 55%, #FAD0B5 100%);
    display: flex; align-items: center;
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    position: relative;
  }
  .geo { position: absolute; border-radius: 50%; border: 1px solid rgba(212,113,59,0.18); }
  .geo.g1 { width: 800px; height: 800px; right: -100px; top: -100px; }
  .geo.g2 { width: 500px; height: 500px; right: 150px; top: 80px; }

  .left-panel {
    width: 480px; height: 100%;
    background: rgba(255,255,255,0.5);
    border-right: 1px solid rgba(212,113,59,0.2);
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    flex-shrink: 0;
    position: relative; z-index: 2;
  }
  .chapter-num {
    font-family: 'Georgia', serif;
    font-size: 240px; font-weight: 700;
    color: rgba(44,21,5,0.05);
    line-height: 1;
    position: absolute; bottom: -20px; left: 30px;
    letter-spacing: -0.06em;
  }
  .chapter-label {
    font-size: 16px; letter-spacing: 0.3em;
    color: #9A6848;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .chapter-index {
    font-family: 'Georgia', serif;
    font-size: 86px; font-weight: 700;
    color: #2C1505;
    line-height: 1;
    margin-bottom: 8px;
  }

  .right-panel {
    flex: 1; padding: 0 100px;
    position: relative; z-index: 2;
  }
  .main-title {
    font-family: 'Georgia', 'Microsoft JhengHei', serif;
    font-size: 115px; font-weight: 700;
    color: #2C1505;
    line-height: 1.1;
    margin-bottom: 32px;
    letter-spacing: -0.01em;
  }
  .sub-text {
    font-size: 26px;
    color: #5C3A20;
    line-height: 1.7;
    max-width: 780px;
  }
  .kpi-row {
    display: flex; gap: 64px; margin-top: 60px;
  }
  .kpi-item {}
  .kpi-num {
    font-family: 'Georgia', serif;
    font-size: 67px; font-weight: 700;
    color: #B85A20;
    line-height: 1;
  }
  .kpi-label {
    font-size: 18px; color: #9A6848;
    margin-top: 6px; letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="geo g1"></div>
  <div class="geo g2"></div>

  <div class="left-panel">
    <div class="chapter-num">一</div>
    <div class="chapter-label">Chapter 01</div>
    <div class="chapter-index">一</div>
  </div>

  <div class="right-panel">
    <div class="main-title">成果</div>
    <div class="sub-text">
      從能源管理系統建置、全省推展，<br>
      到結合 AI 完成效率分析與招標計畫擬定
    </div>
    <div class="kpi-row">
      <div class="kpi-item">
        <div class="kpi-num">2024</div>
        <div class="kpi-label">EMS 建置啟動年份</div>
      </div>
      <div class="kpi-item">
        <div class="kpi-num">全省</div>
        <div class="kpi-label">2024/10 推展範圍</div>
      </div>
      <div class="kpi-item">
        <div class="kpi-num">AI+</div>
        <div class="kpi-label">2026 效率分析引入</div>
      </div>
    </div>
  </div>
<script>
(function(){
  var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  var b = document.body;
  b.style.transform = 'scale('+s+')';
  b.style.transformOrigin = 'top left';
  b.style.position = 'fixed';
  b.style.top  = ((window.innerHeight - 1080*s)/2) + 'px';
  b.style.left = ((window.innerWidth  - 1920*s)/2) + 'px';
  document.documentElement.style.overflow = 'hidden';
  document.documentElement.style.background = document.body.style.background || getComputedStyle(b).background;
})();
</script>
</body>
</html>
