<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    background: #FFFFFF;
    font-family: 'Microsoft JhengHei', 'PingFang TC', 'Helvetica Neue', sans-serif;
    display: flex; flex-direction: column;
  }
  .slide-header {
    padding: 64px 120px 0;
    flex-shrink: 0;
  }
  .slide-title {
    font-family: 'Georgia', 'Microsoft JhengHei', serif;
    font-size: 46px; font-weight: 700;
    color: #2C1505;
    letter-spacing: 0.02em;
  }
  .slide-title-en {
    font-size: 19px; color: #9A6848;
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-top: 8px;
  }
  .rule { width: 100%; height: 1px; background: #F0DDD0; margin-top: 32px; }

  .cards-area {
    flex: 1; display: flex;
    align-items: center;
    padding: 0 120px;
    gap: 40px;
  }
  .chapter-card {
    flex: 1; height: 420px;
    border-radius: 12px;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 48px;
    position: relative; overflow: hidden;
    cursor: pointer;
    transition: transform .2s;
  }
  .chapter-card:hover { transform: translateY(-4px); }
  .chapter-card.c1 { background: linear-gradient(145deg, #1E0C04, #7A3010); }
  .chapter-card.c2 { background: linear-gradient(145deg, #D4713B, #E8956D); }
  .chapter-card.c3 { background: linear-gradient(145deg, #E8956D, #CF6535); }
  .chapter-card.c4 { background: linear-gradient(145deg, #2C1505, #D4713B); }

  .card-number {
    font-size: 144px; font-weight: 700;
    color: rgba(255,255,255,0.06);
    position: absolute; top: 20px; right: 32px;
    line-height: 1;
    font-family: 'Georgia', serif;
    letter-spacing: -0.04em;
  }
  .card-label {
    font-size: 17px; letter-spacing: 0.2em;
    color: rgba(249,206,172,0.7);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Georgia', 'Microsoft JhengHei', serif;
    font-size: 43px; font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
  }
  .card-items {
    margin-top: 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .card-item {
    font-size: 18px;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
    padding-left: 14px;
    position: relative;
  }
  .card-item::before {
    content: '';
    position: absolute; left: 0; top: 9px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(249,206,172,0.5);
  }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-title">今日報告架構</div>
    <div class="slide-title-en">Agenda</div>
    <div class="rule"></div>
  </div>

  <div class="cards-area">
    <div class="chapter-card c1">
      <div class="card-number">一</div>
      <div class="card-label">Chapter 01</div>
      <div class="card-title">成果</div>
      <div class="card-items">
        <div class="card-item">EMS 建置與全省推展</div>
        <div class="card-item">AI 效率分析（新店・桃園）</div>
        <div class="card-item">AI 擬定招標計畫</div>
      </div>
    </div>
    <div class="chapter-card c2">
      <div class="card-number">二</div>
      <div class="card-label">Chapter 02</div>
      <div class="card-title">歷程</div>
      <div class="card-items">
        <div class="card-item">2024/02 → 2026/05</div>
        <div class="card-item">EMS → 顧問 → AI 分析</div>
        <div class="card-item">從數據到行動</div>
      </div>
    </div>
    <div class="chapter-card c3">
      <div class="card-number">三</div>
      <div class="card-label">Chapter 03</div>
      <div class="card-title">節能補助申請</div>
      <div class="card-items">
        <div class="card-item">政府節能補助計畫</div>
        <div class="card-item">申請進度說明</div>
      </div>
    </div>
    <div class="chapter-card c4">
      <div class="card-number">四</div>
      <div class="card-label">Chapter 04</div>
      <div class="card-title">電表數位化</div>
      <div class="card-items">
        <div class="card-item">儀表板建置成果</div>
        <div class="card-item">23 大會所電力監控</div>
        <div class="card-item">推算 vs 實測差異分析</div>
      </div>
    </div>
  </div>
<script>
(function(){
  var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  var b = document.body;
  b.style.transform = 'scale('+s+')';
  b.style.transformOrigin = 'top left';
  b.style.position = 'fixed';
  b.style.top  = ((window.innerHeight - 1080*s)/2) + 'px';
  b.style.left = ((window.innerWidth  - 1920*s)/2) + 'px';
  document.documentElement.style.overflow = 'hidden';
  document.documentElement.style.background = document.body.style.background || getComputedStyle(b).background;
})();
</script>
</body>
</html>
