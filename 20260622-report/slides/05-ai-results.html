<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    background: #FFF8F3;
    font-family: 'Microsoft JhengHei','PingFang TC','Helvetica Neue',sans-serif;
    display: flex; flex-direction: column;
  }
  .hdr { padding: 48px 100px 0; flex-shrink: 0; }
  .hdr-label { font-size: 16px; letter-spacing: 0.25em; color: #9A6848; text-transform: uppercase; margin-bottom: 10px; }
  .hdr-title { font-family: 'Georgia','Microsoft JhengHei',serif; font-size: 48px; font-weight: 700; color: #2C1505; }
  .rule { height: 1px; background: #F0DDD0; margin-top: 22px; }
  .body-area { flex: 1; display: flex; padding: 32px 100px 40px; gap: 40px; }
  .location-col { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .loc-header { display: flex; align-items: center; gap: 14px; padding: 14px 22px; border-radius: 10px; flex-shrink: 0; }
  .loc-header.a { background: #FFEEE3; border-left: 4px solid #D4713B; }
  .loc-header.b { background: #FFF3EA; border-left: 4px solid #E8956D; }
  .loc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .a .loc-dot { background: #D4713B; }
  .b .loc-dot { background: #E8956D; }
  .loc-name { font-size: 19px; font-weight: 700; color: #2C1505; }
  .loc-date { font-size: 16px; color: #9A6848; margin-left: auto; }
  .screen-wrap { flex: 1; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(44,21,5,0.15); position: relative; background: #1E0C04; min-height: 0; }
  .screen-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .screen-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(30,12,4,0.85), transparent); padding: 24px 20px 12px; font-size: 17px; color: rgba(255,255,255,0.8); }
  .screen-label strong { color: #F9CEAC; }
  .findings { display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
  .finding { display: flex; align-items: flex-start; gap: 10px; font-size: 18px; color: #3E2010; line-height: 1.5; }
  .fi-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .a .fi-dot { background: #D4713B; }
  .b .fi-dot { background: #E8956D; }
  .col-divider { width: 1px; background: #F0DDD0; flex-shrink: 0; margin: 8px 0; }
</style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-label">成果 · AI 效率分析</div>
    <div class="hdr-title">運用 AI 進行能源效率分析</div>
    <div class="rule"></div>
  </div>
  <div class="body-area">
    <div class="location-col a">
      <div class="loc-header a">
        <div class="loc-dot"></div>
        <div class="loc-name">新北市 · 新店</div>
        <div class="loc-date">2026 / 05</div>
      </div>
      <div class="screen-wrap">
        <img src="../assets/imgs/slide21_img18.png" alt="新店 AI 分析" />
        <div class="screen-label"><strong>AI 效率分析報告</strong>　新店空調系統優化後效益量化</div>
      </div>
      <div class="findings a">
        <div class="finding a"><div class="fi-dot">✓</div><span>EMS 冰機數據輸入 AI 模型，建立效能基線</span></div>
        <div class="finding a"><div class="fi-dot">✓</div><span>量化優化前後 COP 值差異，提供決策依據</span></div>
        <div class="finding a"><div class="fi-dot">✓</div><span>分析結果轉化為招標文件技術規格</span></div>
      </div>
    </div>
    <div class="col-divider"></div>
    <div class="location-col b">
      <div class="loc-header b">
        <div class="loc-dot"></div>
        <div class="loc-name">桃園</div>
        <div class="loc-date">2026 / 05</div>
      </div>
      <div class="screen-wrap">
        <img src="../assets/imgs/slide24_img21.png" alt="桃園 AI 分析" />
        <div class="screen-label"><strong>AI 效率分析報告</strong>　桃園空調設備汰換後效益確認</div>
      </div>
      <div class="findings b">
        <div class="finding b"><div class="fi-dot">✓</div><span>汰換前後 EMS 數據對比，AI 量化節能效益</span></div>
        <div class="finding b"><div class="fi-dot">✓</div><span>以桃園成果為範本，擬定全省推展計畫</span></div>
        <div class="finding b"><div class="fi-dot">✓</div><span>效能推估模型建立，供後續場域比較使用</span></div>
      </div>
    </div>
  </div>
</body>
<script>
(function(){
  var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  var b = document.body;
  b.style.transform = 'scale('+s+')';
  b.style.transformOrigin = 'top left';
  b.style.position = 'fixed';
  b.style.top  = ((window.innerHeight - 1080*s)/2) + 'px';
  b.style.left = ((window.innerWidth  - 1920*s)/2) + 'px';
  document.documentElement.style.overflow = 'hidden';
  document.documentElement.style.background = '#FFF8F3';
})();
</script>
</html>
